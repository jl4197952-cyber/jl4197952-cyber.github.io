<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="薄肌训练">
<title>薄肌训练日志 · 178cm / 72kg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-card: #131318;
    --bg-elevated: #1c1c24;
    --border: #26262f;
    --border-strong: #3a3a47;
    --text: #ebe9e4;
    --text-dim: #8b8a93;
    --text-faint: #595862;
    --accent: #a78bfa;
    --accent-dim: #a78bfa22;
    --stretch: #60a5fa;
    --stretch-dim: #60a5fa22;
    --success: #6ee787;
    --success-dim: #6ee78718;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
  .header { padding: calc(env(safe-area-inset-top) + 16px) 20px 12px; background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; }
  .title { font-family: var(--serif); font-weight: 600; font-size: 28px; letter-spacing: -0.02em; margin: 0; font-variation-settings: 'opsz' 144; }
  .title em { font-style: italic; color: var(--accent); font-weight: 500; }
  .date { font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.05em; text-transform: uppercase; }
  .day-tabs { display: flex; gap: 6px; margin-top: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex: 1; min-width: 0; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; letter-spacing: 0.02em; }
  .day-tab .day-num { display: block; font-size: 14px; color: var(--text); margin-bottom: 2px; font-weight: 600; }
  .day-tab.active { background: var(--accent); border-color: var(--accent); color: #0d0a1a; }
  .day-tab.active .day-num { color: #0d0a1a; }
  .day-tab.completed::after { content: '●'; color: var(--success); margin-left: 4px; font-size: 8px; }
  .main { padding: 20px; }
  .day-header { margin-bottom: 18px; }
  .day-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .day-title { font-family: var(--serif); font-size: 32px; font-weight: 500; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 14px; font-variation-settings: 'opsz' 144; }
  .day-title em { color: var(--accent); font-style: italic; }
  .progress-row { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .progress-bar { flex: 1; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; position: relative; }
  .progress-fill { position: absolute; inset: 0; width: 0%; background: var(--accent); transition: width 0.3s ease-out; border-radius: 2px; }
  :root {
    --warmup: #fb923c;
    --warmup-dim: #fb923c22;
  }
  .section-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 14px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stretch); }
  .section-divider.warmup-divider { color: var(--warmup); }
  .warmup-block { background: var(--bg-card); border: 1px solid rgba(251,146,60,0.25); border-radius: 14px; padding: 18px 16px; margin-bottom: 16px; }
  .warmup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; user-select: none; }
  .warmup-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--warmup-dim); border: 1px solid rgba(251,146,60,0.3); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .warmup-title-wrap { flex: 1; }
  .warmup-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warmup); margin-bottom: 3px; }
  .warmup-title { font-family: var(--serif); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; font-variation-settings: 'opsz' 72; }
  .warmup-toggle { font-family: var(--mono); font-size: 11px; color: var(--warmup); padding: 6px 12px; background: var(--warmup-dim); border-radius: 6px; border: 1px solid rgba(251,146,60,0.4); flex-shrink: 0; transition: all 0.15s; font-weight: 600; letter-spacing: 0.05em; }
  .warmup-body { display: none; }
  .warmup-block.open .warmup-body { display: block; }
  .warmup-block.open .warmup-toggle { color: var(--warmup); border-color: rgba(251,146,60,0.4); }
  .warmup-note { font-size: 12px; line-height: 1.55; color: var(--text-dim); margin: 0 0 14px; padding: 10px 12px; background: var(--bg-elevated); border-radius: 8px; border-left: 3px solid var(--warmup); }
  .warmup-steps { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .warmup-step { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; background: var(--bg-elevated); border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .warmup-step.checked { border-color: rgba(251,146,60,0.4); background: var(--warmup-dim); }
  .warmup-step-num { width: 22px; height: 22px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-dim); flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
  .warmup-step.checked .warmup-step-num { background: var(--warmup); border-color: var(--warmup); color: #1a0800; }
  .warmup-step-content { flex: 1; }
  .warmup-step-name { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
  .warmup-step.checked .warmup-step-name { color: var(--text-dim); }
  .warmup-step-detail { font-family: var(--mono); font-size: 11px; color: var(--warmup); margin-bottom: 3px; }
  .warmup-step.checked .warmup-step-detail { color: var(--text-faint); }
  .warmup-step-tip { font-size: 11px; color: var(--text-faint); line-height: 1.4; font-style: italic; }
  .warmup-progress { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .warmup-progress-bar { flex: 1; height: 3px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
  .warmup-progress-fill { height: 100%; background: var(--warmup); border-radius: 2px; transition: width 0.3s ease-out; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .exercise { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; margin-bottom: 12px; transition: border-color 0.2s; }
  .exercise.done { border-color: var(--success-dim); background: linear-gradient(180deg, var(--success-dim) 0%, var(--bg-card) 100%); }
  .exercise.stretch { border-color: rgba(96, 165, 250, 0.2); }
  .exercise.stretch.done { border-color: var(--success-dim); }
  .exercise.key-move { border-color: rgba(167,139,250,0.3); }
  .exercise-num { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; margin-bottom: 4px; }
  .exercise-name { font-family: var(--serif); font-size: 20px; font-weight: 500; line-height: 1.25; letter-spacing: -0.01em; margin: 0 0 4px; font-variation-settings: 'opsz' 72; }
  .exercise-muscle { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 2px 7px; border-radius: 4px; margin-bottom: 12px; letter-spacing: 0.05em; }
  .exercise.stretch .exercise-muscle { color: var(--stretch); background: var(--stretch-dim); }
  .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .spec { background: var(--bg-elevated); padding: 10px 12px; border-radius: 8px; }
  .spec-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .spec-value { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 600; }
  .weight-row { background: var(--bg-elevated); padding: 12px; border-radius: 8px; margin-bottom: 14px; border-left: 3px solid var(--accent); }
  .exercise.stretch .weight-row { border-left-color: var(--stretch); }
  .weight-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .weight-value { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.5; }
  .actual-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; align-items: center; gap: 8px; }
  .actual-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
  .actual-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border-strong); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 4px 0; outline: none; }
  .actual-input:focus { border-color: var(--accent); }
  .actual-input::placeholder { color: var(--text-faint); }
  .sets { display: flex; gap: 8px; flex-wrap: wrap; }
  .set-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--bg-elevated); border: 1px solid var(--border-strong); color: var(--text-dim); font-family: var(--mono); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; user-select: none; }
  .set-btn:active { transform: scale(0.92); }
  .set-btn.done { background: var(--success); border-color: var(--success); color: #053d12; }
  .notes { font-family: var(--sans); font-size: 12px; line-height: 1.5; color: var(--text-dim); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-style: italic; }
  .info-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .info-block.highlight { border-color: var(--accent-dim); }
  .info-title { font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 10px; }
  .info-title em { color: var(--accent); font-style: italic; }
  .info-block ul { padding-left: 18px; margin: 8px 0; font-size: 14px; line-height: 1.7; color: var(--text-dim); }
  .info-block li { margin-bottom: 4px; }
  .info-block li strong { color: var(--text); font-weight: 600; }
  .info-block p { font-size: 14px; line-height: 1.65; color: var(--text-dim); margin: 8px 0; }
  .info-block p strong { color: var(--text); font-weight: 600; }
  .weight-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0; }
  .weight-table th { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  .weight-table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-dim); vertical-align: middle; }
  .weight-table td:first-child { color: var(--text); font-size: 13px; }
  .weight-table td:last-child { color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .weight-table tr:last-child td { border-bottom: none; }
  .footer { padding: 24px 20px 32px; display: flex; gap: 10px; border-top: 1px solid var(--border); margin-top: 30px; }
  .btn { flex: 1; padding: 14px; background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 10px; color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn-danger { color: #ff6b6b; border-color: #ff6b6b40; }
</style>
</head>
<body>
<header class="header">
  <div class="header-row">
    <h1 class="title">薄肌<em>训练</em></h1>
    <span class="date" id="date"></span>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>
<main class="main" id="main"></main>
<div class="footer">
  <button class="btn" onclick="resetDay()">重置本日</button>
  <button class="btn btn-danger" onclick="resetAll()">清空全部</button>
</div>
<script>
// 体型：178cm / 72kg，薄肌目标，避开斜方肌

const WARMUP = {
  day1: {
    title: '胸 & 核心专项热身',
    note: '今天主练胸肌和核心，热身重点：激活胸大肌、打开肩关节活动度、预热肩袖肌群，避免胸椎僵硬导致卧推受伤。全程约 7-9 分钟。',
    steps: [

      { name: '肩关节绕环', detail: '前绕 10次 + 后绕 10次 × 双侧', tip: '慢速大幅度画圆，感受肩膀整个关节被打开，卧推前必做' },
      { name: '胸椎猫牛式（四肢跪地）', detail: '10 次缓慢呼吸', tip: '吸气时塌腰抬头，呼气时拱背低头。改善胸椎伸展，让卧推轨迹更顺畅' },
      { name: '毛毛虫爬行', detail: '5 次往返', tip: '站立前弯→手走到俯卧撑位→原路返回，激活核心与肩胛稳定肌群' },
      { name: '徒手俯卧撑（预热）', detail: '2 组 × 10次，慢速', tip: '专注感受胸肌发力，不是做爆发力。帮助建立神经募集和胸肌心理连接' },
      { name: '空手绳索/手臂画圆夹胸', detail: '双臂在胸前画圆 15次 × 2组', tip: '模拟飞鸟动作，激活胸大肌内侧收缩感，卧推时更容易"找到"肌肉' },
      { name: '空杆 / 极轻哑铃预热组', detail: '哑铃 5kg 平板卧推 × 15次', tip: '正式重量的30-40%做1-2组，感受动作轨迹，不是训练，是校准' },
    ]
  },
  day2: {
    title: '背 & 背阔专项热身',
    note: '今天主练背阔肌，热身重点：打开肩关节，激活背阔「启动感」，放松可能紧张的斜方肌/颈肩，让引体向上时能真正用背不用肩。约 8 分钟。',
    steps: [

      { name: '胸椎旋转（坐姿）', detail: '每侧 10次 × 2组', tip: '坐凳子，双手抱头，只转动上背部。改善胸椎灵活性，让背部拉力传导更顺畅' },
      { name: '弹力带/轻绳索直臂下拉（激活）', detail: '极轻重量 × 15次 × 2组', tip: '★ 最重要的热身步骤：用极轻重量感受背阔"把手臂往下拉"的感觉，建立正确神经募集模式' },

  },
  day3: {

    steps: [

      { name: '深蹲下蹲保持（深蹲小憩）', detail: '蹲到底保持 60秒（可扶支撑物）', tip: '这是检验髋踝灵活度的最直接方式，感觉哪里卡就在哪里多放松' },

  },

      { name: '肩关节绕环（前绕+后绕）', detail: '前后各 10次 × 双侧', tip: '慢速大圆，感受肩关节被充分润滑。肩膀有弹响可适当多做几组直到消失' },
      { name: '墙角胸椎伸展（面朝墙角站立）', detail: '保持 30秒 × 2组', tip: '双手扶墙两侧，身体向墙角前倾，打开前胸。胸椎伸展后肩推轨迹更顺，不容易产生撞击' },

let state = loadState();
let currentDay = state.currentDay || 'day1';

function loadState() {
  try { const s = localStorage.getItem('slimMuscleState'); return s ? JSON.parse(s) : { sets: {}, weights: {}, warmup: {}, warmupOpen: {}, currentDay: 'day1' }; }
  catch (e) { return { sets: {}, weights: {}, warmup: {}, warmupOpen: {}, currentDay: 'day1' }; }
}
function saveState() { try { localStorage.setItem('slimMuscleState', JSON.stringify(state)); } catch (e) {} }
function toggleSet(dayKey, exIdx, setIdx) {
  const key = `${dayKey}_${exIdx}_${setIdx}`;
  state.sets[key] = !state.sets[key];
  saveState(); render();
}
function toggleWarmupStep(dayKey, stepIdx) {
  const key = `${dayKey}_w${stepIdx}`;
  state.warmup[key] = !state.warmup[key];
  saveState(); render();
}
function toggleWarmupOpen(dayKey) {
  state.warmupOpen[dayKey] = !state.warmupOpen[dayKey];
  saveState(); render();
}
function saveActualWeight(dayKey, exIdx, value) { state.weights[`${dayKey}_${exIdx}_actual`] = value; saveState(); }
function switchDay(day) { currentDay = day; state.currentDay = day; saveState(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function resetDay() {
  if (!confirm('重置本日所有打勾记录？')) return;
  Object.keys(state.sets).forEach(k => { if (k.startsWith(currentDay + '_')) delete state.sets[k]; });
  if (state.warmup) Object.keys(state.warmup).forEach(k => { if (k.startsWith(currentDay + '_')) delete state.warmup[k]; });
  saveState(); render();
}
function resetAll() {
  if (!confirm('清空全部数据？')) return;
  state = { sets: {}, weights: {}, warmup: {}, warmupOpen: {}, currentDay: 'day1' }; saveState(); currentDay = 'day1'; render();
}
function isDayComplete(dayKey) {
  if (dayKey === 'info') return false;
  const exs = PLAN[dayKey].exercises;
  for (let i = 0; i < exs.length; i++) for (let s = 0; s < exs[i].sets; s++) if (!state.sets[`${dayKey}_${i}_${s}`]) return false;
  return true;
}
function getDayProgress(dayKey) {
  const exs = PLAN[dayKey].exercises;
  let total = 0, done = 0;
  exs.forEach((ex, i) => { for (let s = 0; s < ex.sets; s++) { total++; if (state.sets[`${dayKey}_${i}_${s}`]) done++; } });
  return { done, total, pct: total ? (done/total*100) : 0 };
}

function render() {
  const d = new Date();
  document.getElementById('date').textContent = `${d.getMonth()+1}月${d.getDate()}日 · ${['日','一','二','三','四','五','六'][d.getDay()]}`;
  const tabsEl = document.getElementById('dayTabs');
  const days = [
    { key: 'day1', label: '推', num: 'Day 1' },
    { key: 'day2', label: '拉', num: 'Day 2' },
    { key: 'day3', label: '腿', num: 'Day 3' },
    { key: 'day4', label: '肩臂', num: 'Day 4' },
    { key: 'info', label: '原则', num: 'Info' }
  ];
  tabsEl.innerHTML = days.map(d => {
    const complete = d.key !== 'info' && isDayComplete(d.key) ? 'completed' : '';
    const active = currentDay === d.key ? 'active' : '';
    return `<div class="day-tab ${active} ${complete}" onclick="switchDay('${d.key}')"><span class="day-num">${d.num}</span>${d.label}</div>`;
  }).join('');

  const main = document.getElementById('main');
  if (currentDay === 'info') {
    main.innerHTML = `<div class="day-header"><div class="day-meta">PRINCIPLES / WEIGHTS / TIPS</div><h2 class="day-title">原则与<em>参考</em></h2></div>${PRINCIPLES_HTML}`;
    return;
  }

  const day = PLAN[currentDay];
  const prog = getDayProgress(currentDay);
  let firstStretchIndex = day.exercises.findIndex(ex => ex.isStretch);
  let exercisesHTML = '';

  // Warmup block
  const wu = WARMUP[currentDay];
  const isOpen = !state.warmupOpen || state.warmupOpen[currentDay] !== false; // default open
  const warmupDoneCount = wu.steps.filter((_, i) => state.warmup && state.warmup[`${currentDay}_w${i}`]).length;
  const warmupPct = Math.round(warmupDoneCount / wu.steps.length * 100);
  const warmupStepsHTML = wu.steps.map((step, i) => {
    const checked = state.warmup && state.warmup[`${currentDay}_w${i}`];
    return `<li class="warmup-step ${checked ? 'checked' : ''}" onclick="toggleWarmupStep('${currentDay}',${i})">
      <div class="warmup-step-num">${checked ? '✓' : i+1}</div>
      <div class="warmup-step-content">
        <div class="warmup-step-name">${step.name}</div>
        <div class="warmup-step-detail">${step.detail}</div>
        <div class="warmup-step-tip">${step.tip}</div>
      </div>
    </li>`;
  }).join('');

  const warmupHTML = `
    <div class="warmup-block ${isOpen ? 'open' : ''}">
      <div class="warmup-header" onclick="toggleWarmupOpen('${currentDay}')">
        <div class="warmup-icon">🔥</div>
        <div class="warmup-title-wrap">
          <div class="warmup-tag">Warm-Up · 训练前热身</div>
          <div class="warmup-title">${wu.title}</div>
        </div>
        <div class="warmup-toggle">${isOpen ? '收起' : '展开'}</div>
      </div>
      <div class="warmup-body">
        <div class="warmup-note">${wu.note}</div>
        <ul class="warmup-steps">${warmupStepsHTML}</ul>
        <div class="warmup-progress">
          <div class="warmup-progress-bar"><div class="warmup-progress-fill" style="width:${warmupPct}%"></div></div>
          <span>${warmupDoneCount}/${wu.steps.length} 完成</span>
        </div>
      </div>
    </div>
    <div class="section-divider">正式训练 · Main Work</div>
  `;

  day.exercises.forEach((ex, i) => {
    if (i === firstStretchIndex && firstStretchIndex > 0) exercisesHTML += `<div class="section-divider">训练后拉伸 · Cool Down</div>`;
    let allDone = true;
    const setBtns = [];
    for (let s = 0; s < ex.sets; s++) {
      const key = `${currentDay}_${i}_${s}`;
      const done = state.sets[key];
      if (!done) allDone = false;
      setBtns.push(`<button class="set-btn ${done?'done':''}" onclick="toggleSet('${currentDay}',${i},${s})">${s+1}</button>`);
    }
    const actualVal = state.weights[`${currentDay}_${i}_actual`] || '';
    const stretchClass = ex.isStretch ? 'stretch' : '';
    const labelText = ex.isStretch ? '拉伸方法' : '推荐重量（72kg版）';
    const placeholderText = ex.isStretch ? '拉伸感受（可选）' : '如：12.5kg × 10次';

    exercisesHTML += `
      <div class="exercise ${stretchClass} ${allDone?'done':''}">
        <div class="exercise-num">${ex.isStretch ? 'STRETCH' : 'EXERCISE'} ${String(i+1).padStart(2,'0')}</div>
        <h3 class="exercise-name">${ex.name}</h3>
        <span class="exercise-muscle">${ex.muscle}</span>
        <div class="specs">
          <div class="spec"><div class="spec-label">${ex.isStretch ? '次数 × 时长' : '组数 × 次数'}</div><div class="spec-value">${ex.sets} × ${ex.reps}</div></div>
          <div class="spec"><div class="spec-label">${ex.isStretch ? '说明' : '组间休息'}</div><div class="spec-value">${ex.rest}</div></div>
        </div>
        <div class="weight-row">
          <div class="weight-label">${labelText}</div>
          <div class="weight-value">${ex.weight}</div>
          <div class="actual-row">
            <span class="actual-label">今天用：</span>
            <input class="actual-input" type="text" placeholder="${placeholderText}" value="${actualVal}" oninput="saveActualWeight('${currentDay}',${i},this.value)">
          </div>
        </div>
        <div class="sets">${setBtns.join('')}</div>
        <div class="notes">${ex.notes}</div>
      </div>
    `;
  });

  main.innerHTML = `
    <div class="day-header">
      <div class="day-meta">${currentDay.toUpperCase()} / ${day.focus}</div>
      <h2 class="day-title">${day.title.replace(day.focus, '<em>' + day.focus + '</em>')}</h2>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
        <span>${prog.done}/${prog.total}</span>
      </div>
    </div>
    ${warmupHTML}
    ${exercisesHTML}
  `;
}

render();
</script>
</body>
</html>
