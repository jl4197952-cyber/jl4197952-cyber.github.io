<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="薄肌训练">
<title>薄肌训练日志 · 178cm / 80kg · Upper/Lower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b; --bg-card: #131318; --bg-elevated: #1c1c24;
    --border: #26262f; --border-strong: #3a3a47;
    --text: #ebe9e4; --text-dim: #8b8a93; --text-faint: #595862;
    --accent: #a78bfa; --accent-dim: #a78bfa22;
    --warm: #fbbf24; --warm-dim: #fbbf2418;
    --stretch: #60a5fa; --stretch-dim: #60a5fa22;
    --success: #6ee787; --success-dim: #6ee78718;
    --trend: #f97362; --trend-dim: #f9736218;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
  .header { padding: calc(env(safe-area-inset-top) + 16px) 20px 12px; background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; }
  .title { font-family: var(--serif); font-weight: 600; font-size: 26px; letter-spacing: -0.02em; margin: 0; font-variation-settings: 'opsz' 144; }
  .title em { font-style: italic; color: var(--accent); font-weight: 500; }
  .title .sub { display:block; font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; margin-top: 2px; font-weight: 500; }
  .date { font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.05em; text-transform: uppercase; }
  .day-tabs { display: flex; gap: 6px; margin-top: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex: 1; min-width: 0; padding: 10px 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-dim); font-family: var(--mono); font-size: 10px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
  .day-tab .day-num { display: block; font-size: 13px; color: var(--text); margin-bottom: 2px; font-weight: 600; }
  .day-tab.active { background: var(--accent); border-color: var(--accent); color: #0d0a1a; }
  .day-tab.active .day-num { color: #0d0a1a; }
  .day-tab.completed::after { content: '●'; color: var(--success); margin-left: 3px; font-size: 8px; }
  .main { padding: 20px; }
  .day-header { margin-bottom: 18px; }
  .day-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .day-title { font-family: var(--serif); font-size: 28px; font-weight: 500; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 6px; font-variation-settings: 'opsz' 144; }
  .day-title em { color: var(--accent); font-style: italic; }
  .day-sub { font-family: var(--sans); font-size: 13px; color: var(--text-dim); margin: 0 0 14px; line-height: 1.5; }
  .progress-row { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .progress-bar { flex: 1; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; position: relative; }
  .progress-fill { position: absolute; inset: 0; width: 0%; background: var(--accent); transition: width 0.3s ease-out; border-radius: 2px; }

  .section-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 14px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-divider.warmup { color: var(--warm); }
  .section-divider.stretch { color: var(--stretch); }
  .section-divider.main-workout { color: var(--accent); }

  .exercise { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; margin-bottom: 12px; transition: border-color 0.2s; }
  .exercise.done { border-color: var(--success-dim); background: linear-gradient(180deg, var(--success-dim) 0%, var(--bg-card) 100%); }
  .exercise.warmup-card { border-color: rgba(251,191,36,0.25); background: linear-gradient(180deg, var(--warm-dim) 0%, var(--bg-card) 100%); }
  .exercise.warmup-card.done { border-color: var(--success-dim); background: linear-gradient(180deg, var(--success-dim) 0%, var(--bg-card) 100%); }
  .exercise.stretch-card { border-color: rgba(96,165,250,0.2); }
  .exercise.stretch-card.done { border-color: var(--success-dim); }
  .exercise-num { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; margin-bottom: 4px; }
  .exercise-name { font-family: var(--serif); font-size: 19px; font-weight: 500; line-height: 1.25; letter-spacing: -0.01em; margin: 0 0 4px; font-variation-settings: 'opsz' 72; }
  .exercise-muscle { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; margin-bottom: 12px; letter-spacing: 0.05em; }
  .exercise-muscle.main { color: var(--accent); background: var(--accent-dim); }
  .exercise-muscle.warm { color: var(--warm); background: var(--warm-dim); }
  .exercise-muscle.cool { color: var(--stretch); background: var(--stretch-dim); }
  .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .spec { background: var(--bg-elevated); padding: 10px 12px; border-radius: 8px; }
  .spec-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .spec-value { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 600; }
  .info-row { background: var(--bg-elevated); padding: 12px; border-radius: 8px; margin-bottom: 14px; }
  .info-row.main { border-left: 3px solid var(--accent); }
  .info-row.warm { border-left: 3px solid var(--warm); }
  .info-row.cool { border-left: 3px solid var(--stretch); }
  .info-row-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .info-row-value { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.5; }
  .actual-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; align-items: center; gap: 8px; }
  .actual-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
  .actual-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border-strong); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 4px 0; outline: none; }
  .actual-input:focus { border-color: var(--accent); }
  .actual-input::placeholder { color: var(--text-faint); }
  .save-btn { flex-shrink: 0; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 10px; padding: 6px 10px; border-radius: 6px; cursor: pointer; letter-spacing: 0.05em; }
  .save-btn:active { transform: scale(0.95); }
  .trend-row { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .trend-label { font-family: var(--mono); font-size: 9px; color: var(--trend); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 2px; }
  .trend-chip { font-family: var(--mono); font-size: 10px; color: var(--text-dim); background: var(--bg-elevated); padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border); }
  .trend-chip.latest { color: var(--trend); border-color: var(--trend-dim); }
  .trend-empty { font-family: var(--sans); font-size: 11px; color: var(--text-faint); font-style: italic; }
  .sets { display: flex; gap: 8px; flex-wrap: wrap; }
  .set-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--bg-elevated); border: 1px solid var(--border-strong); color: var(--text-dim); font-family: var(--mono); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; user-select: none; }
  .set-btn:active { transform: scale(0.92); }
  .set-btn.done { background: var(--success); border-color: var(--success); color: #053d12; }
  .notes { font-family: var(--sans); font-size: 12px; line-height: 1.5; color: var(--text-dim); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-style: italic; }

  .info-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .info-block.highlight { border-color: var(--accent-dim); }
  .info-block.warn { border-color: rgba(251,191,36,0.25); }
  .info-title { font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 10px; }
  .info-title em { color: var(--accent); font-style: italic; }
  .info-block ul { padding-left: 18px; margin: 8px 0; font-size: 14px; line-height: 1.7; color: var(--text-dim); }
  .info-block li { margin-bottom: 4px; }
  .info-block li strong { color: var(--text); font-weight: 600; }
  .info-block p { font-size: 14px; line-height: 1.65; color: var(--text-dim); margin: 8px 0; }
  .info-block p strong { color: var(--text); font-weight: 600; }
  .weight-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0; }
  .weight-table th { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  .weight-table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-dim); vertical-align: middle; }
  .weight-table td:first-child { color: var(--text); font-size: 13px; }
  .weight-table td:last-child { color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .weight-table tr:last-child td { border-bottom: none; }
  .footer { padding: 24px 20px 32px; display: flex; gap: 10px; border-top: 1px solid var(--border); margin-top: 30px; }
  .btn { flex: 1; padding: 14px; background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 10px; color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn-danger { color: #ff6b6b; border-color: #ff6b6b40; }
</style>
</head>
<body>
<header class="header">
  <div class="header-row">
    <h1 class="title">薄肌<em>训练</em><span class="sub">UPPER / LOWER · 2x/周</span></h1>
    <span class="date" id="date"></span>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>
<main class="main" id="main"></main>
<div class="footer">
  <button class="btn" onclick="resetDay()">重置本日</button>
  <button class="btn btn-danger" onclick="resetAll()">清空全部</button>
</div>
<script>
const PLAN = {

    warmup: [

        sets: 1, reps: '5分钟',
        notes: '不要冷着身体直接卧推，肩袖撕裂的主要原因之一' },
      { name: '手臂绕环', tag: '肩关节激活',
        info: '双臂向前绕大圈20次，再向后20次，感受肩关节充分活动',
        sets: 1, reps: '前后各20次',
        notes: '动作要慢，把整个肩关节画最大的圆' },
      { name: '肩袖激活（弹力带外旋）', tag: '肩袖预热',
        info: '弹力带绕手腕，双臂夹紧身体、前臂平行地面，做外旋动作。无弹力带可用1-2kg哑铃',
        sets: 2, reps: '15次',
        notes: '★ 现在一周两次上肢日，肩袖负荷变高，这组不能省' },
      { name: '空杆卧推 / 极轻哑铃卧推', tag: '动作模式预热',
        info: '用空杆或5kg哑铃做1组，专注感受肩胛收紧、胸肌发力的动作模式',
        sets: 1, reps: '15次',
        notes: '★ 告诉肌肉今天要做什么，不要跳过' },

    exercises: [
      { name: '哑铃平板卧推', muscle: '胸 主项',
        weight: '哑铃 14-16kg / 手（80kg体重版）',
        sets: 4, reps: '8-10', rest: '90秒',
        notes: '★ 主项，留1-2次余量。肩胛收紧贴凳，下放到胸口感受拉伸，不弹胸借力' },

        weight: '自重 80kg（能完成3×12后加负重）',
        sets: 3, reps: '8-12', rest: '60-90秒',
        notes: '身体前倾15-20°刺激胸。下到大臂平行地面' },
      { name: '哑铃坐姿肩推', muscle: '肩前束 主项',
        weight: '哑铃 12-15kg / 手',
        sets: 3, reps: '10-12', rest: '90秒',
        notes: '中等重量，不冲极限，不耸肩' },
      { name: '高位下拉（宽握）', muscle: '背阔 宽度',
        weight: '44-55kg（体重55-70%）',
        sets: 3, reps: '10-12', rest: '90秒',
        notes: '拉到锁骨位置，绝对不拉颈后。上臂往腋下方向用力' },
      { name: '侧平举（哑铃或绳索）', muscle: '★★ 中束三角 核心',

        sets: 3, reps: '12-15', rest: '60秒',
        notes: '★★ V字感来源。现在一周练两次，重量更要克制，肘微屈，顶部停0.5秒' },
      { name: '反向飞鸟', muscle: '后束三角',
        weight: '哑铃 5-6kg / 手',
        sets: 3, reps: '12-15', rest: '60秒',
        notes: '让肩部立体。俯身，手臂微屈向两侧展开' },
      { name: '卷腹', muscle: '上腹',
        weight: '自重',
        sets: 3, reps: '15-20', rest: '45秒',
        notes: '顶峰收缩，慢起慢放' },
    ],
    stretches: [
      { name: '门框胸部拉伸', tag: '拉伸 · 胸部',
        info: '单臂屈肘抵住门框，身体前转远离手臂，感受胸大肌被拉长',
        sets: 2, reps: '30秒 / 边',

      { name: '三角肌交叉拉伸', tag: '拉伸 · 肩部',
        info: '一只手水平横过胸前，另一只手压住肘部往身体方向拉',
        sets: 2, reps: '30秒 / 边',

      { name: '三头肌头顶拉伸', tag: '拉伸 · 三头',

    exercises: [

    ],
    stretches: [

  },
  upperB: {

let state = loadState();
let currentDay = state.currentDay || 'upperA';

function loadState() {
  try { const s = localStorage.getItem('slimMuscle80StateV2'); return s ? JSON.parse(s) : { warmup:{}, exercises:{}, stretches:{}, weights:{}, history:{}, currentDay:'upperA' }; }
  catch(e) { return { warmup:{}, exercises:{}, stretches:{}, weights:{}, history:{}, currentDay:'upperA' }; }
}
function saveState() { try { localStorage.setItem('slimMuscle80StateV2', JSON.stringify(state)); } catch(e){} }

function toggleItem(section, dayKey, idx, setIdx) {
  const key = `${section}_${dayKey}_${idx}_${setIdx}`;
  if (!state[section]) state[section] = {};
  state[section][key] = !state[section][key];
  saveState(); render();
}
function isItemDone(section, dayKey, idx, setIdx) {
  if (!state[section]) return false;
  return !!state[section][`${section}_${dayKey}_${idx}_${setIdx}`];
}
function trendKey(dayKey, section, idx) { return `${dayKey}_${section}_${idx}`; }
function saveWeight(dayKey, section, idx, value) {
  state.weights[trendKey(dayKey, section, idx)] = value;
  saveState();
}
function getWeight(dayKey, section, idx) {
  return state.weights[trendKey(dayKey, section, idx)] || '';
}
function todayStr() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function commitHistory(dayKey, section, idx) {
  const val = getWeight(dayKey, section, idx).trim();
  if (!val) return;
  const k = trendKey(dayKey, section, idx);
  if (!state.history[k]) state.history[k] = {};
  state.history[k][todayStr() + '_' + Date.now()] = val;
  // collapse same-day entries: keep only latest per calendar day
  const today = todayStr();
  Object.keys(state.history[k]).forEach(dateKey => {
    if (dateKey.startsWith(today + '_') && dateKey !== (today + '_' + Date.now())) {
      // will be overwritten naturally below; no-op
    }
  });
  saveState(); render();
}
function getHistory(dayKey, section, idx) {
  const k = trendKey(dayKey, section, idx);
  const h = state.history[k] || {};
  return Object.keys(h).map(dateKey => ({
    date: dateKey.split('_')[0],
    ts: parseInt(dateKey.split('_')[1] || '0', 10),
    value: h[dateKey]
  })).sort((a,b) => a.ts - b.ts);
}

function switchDay(day) { currentDay = day; state.currentDay = day; saveState(); render(); window.scrollTo({top:0,behavior:'smooth'}); }

function resetDay() {
  if (!confirm('重置本日打卡记录？（历史重量记录不会被清除）')) return;
  ['warmup','exercises','stretches'].forEach(sec => {
    if (state[sec]) Object.keys(state[sec]).forEach(k => { if(k.includes(`_${currentDay}_`)) delete state[sec][k]; });
  });
  saveState(); render();
}
function resetAll() {
  if (!confirm('清空全部数据，包括历史重量记录？此操作不可恢复')) return;
  state = { warmup:{}, exercises:{}, stretches:{}, weights:{}, history:{}, currentDay:'upperA' };
  saveState(); currentDay = 'upperA'; render();
}

function isDayComplete(dayKey) {
  if (dayKey === 'info') return false;
  const day = PLAN[dayKey];
  const allItems = [
    ...day.warmup.map((_,i) => ({sec:'warmup',i,sets:1})),
    ...day.exercises.map((_,i) => ({sec:'exercises',i,sets:_.sets})),
    ...day.stretches.map((_,i) => ({sec:'stretches',i,sets:_.sets})),
  ];
  for (const item of allItems) {
    for (let s = 0; s < item.sets; s++) {
      if (!isItemDone(item.sec, dayKey, item.i, s)) return false;
    }
  }
  return true;
}

function getDayProgress(dayKey) {
  const day = PLAN[dayKey];
  let total = 0, done = 0;
  const count = (arr, sec) => arr.forEach((ex,i) => {
    const sets = ex.sets || 1;
    for (let s = 0; s < sets; s++) { total++; if (isItemDone(sec, dayKey, i, s)) done++; }
  });
  count(day.warmup, 'warmup');
  count(day.exercises, 'exercises');
  count(day.stretches, 'stretches');
  return { done, total, pct: total ? (done/total*100) : 0 };
}

function buildTrendRow(dayKey, section, idx) {
  const hist = getHistory(dayKey, section, idx).slice(-3);
  if (!hist.length) return `<div class="trend-row"><span class="trend-label">趋势</span><span class="trend-empty">还没有记录，存几次之后这里会显示变化</span></div>`;
  const chips = hist.map((h,i) => `<span class="trend-chip ${i===hist.length-1?'latest':''}">${h.date}: ${h.value}</span>`).join('');
  return `<div class="trend-row"><span class="trend-label">趋势</span>${chips}</div>`;
}

        </div>
      </div>
      <div class="sets">
        <button class="set-btn ${done?'done':''}" onclick="toggleItem('warmup','${dayKey}',${idx},0)">✓</button>
      </div>
      <div class="notes">${ex.notes}</div>
    </div>`;
}

function buildExerciseCard(ex, dayKey, idx) {
  let allDone = true;
  const btns = [];
  for (let s = 0; s < ex.sets; s++) {
    const done = isItemDone('exercises', dayKey, idx, s);
    if (!done) allDone = false;
    btns.push(`<button class="set-btn ${done?'done':''}" onclick="toggleItem('exercises','${dayKey}',${idx},${s})">${s+1}</button>`);
  }
  const val = getWeight(dayKey, 'exercises', idx);
  return `
    <div class="exercise ${allDone?'done':''}">
      <div class="exercise-num">EXERCISE ${String(idx+1).padStart(2,'0')}</div>
      <h3 class="exercise-name">${ex.name}</h3>
      <span class="exercise-muscle main">${ex.muscle}</span>
      <div class="specs">
        <div class="spec"><div class="spec-label">组数 × 次数</div><div class="spec-value">${ex.sets} × ${ex.reps}</div></div>
        <div class="spec"><div class="spec-label">组间休息</div><div class="spec-value">${ex.rest}</div></div>
      </div>
      <div class="info-row main">
        <div class="info-row-label">推荐重量（80kg版）</div>
        <div class="info-row-value">${ex.weight}</div>
        <div class="actual-row">
          <span class="actual-label">今天用：</span>
          <input class="actual-input" type="text" placeholder="如：15kg × 10次" value="${val}" oninput="saveWeight('${dayKey}','exercises',${idx},this.value)">
          <button class="save-btn" onclick="commitHistory('${dayKey}','exercises',${idx})">存入记录</button>
        </div>
        ${buildTrendRow(dayKey, 'exercises', idx)}
      </div>
      <div class="sets">${btns.join('')}</div>
      <div class="notes">${ex.notes}</div>
    </div>`;
}

function buildStretchCard(ex, dayKey, idx) {
  let allDone = true;
  const btns = [];
  for (let s = 0; s < ex.sets; s++) {
    const done = isItemDone('stretches', dayKey, idx, s);
    if (!done) allDone = false;
    btns.push(`<button class="set-btn ${done?'done':''}" onclick="toggleItem('stretches','${dayKey}',${idx},${s})">${s+1}</button>`);
  }
  const val = getWeight(dayKey, 'stretches', idx);
  return `
    <div class="exercise stretch-card ${allDone?'done':''}">
      <div class="exercise-num">STRETCH ${String(idx+1).padStart(2,'0')}</div>
      <h3 class="exercise-name">${ex.name}</h3>
      <span class="exercise-muscle cool">${ex.tag}</span>
      <div class="specs">
        <div class="spec"><div class="spec-label">次数 × 时长</div><div class="spec-value">${ex.sets} × ${ex.reps}</div></div>
        <div class="spec"><div class="spec-label">说明</div><div class="spec-value">—</div></div>
      </div>
      <div class="info-row cool">
        <div class="info-row-label">拉伸方法</div>
        <div class="info-row-value" style="font-weight:400;color:var(--text-dim);font-family:var(--sans);font-size:12px;line-height:1.6">${ex.info}</div>
        <div class="actual-row">
          <span class="actual-label">感受：</span>
          <input class="actual-input" type="text" placeholder="记录拉伸感受（可选）" value="${val}" oninput="saveWeight('${dayKey}','stretches',${idx},this.value)">
        </div>
      </div>
      <div class="sets">${btns.join('')}</div>
      <div class="notes">${ex.notes}</div>
    </div>`;
}

function render() {
  const d = new Date();
  document.getElementById('date').textContent = `${d.getMonth()+1}月${d.getDate()}日 · ${['日','一','二','三','四','五','六'][d.getDay()]}`;

  const days = [
    {key:'upperA',label:'上肢A',num:'Day 1'},
    {key:'lowerA',label:'下肢A',num:'Day 2'},
    {key:'upperB',label:'上肢B',num:'Day 3'},
    {key:'lowerB',label:'下肢B',num:'Day 4'},
    {key:'info',label:'原则',num:'Info'},
  ];
  document.getElementById('dayTabs').innerHTML = days.map(d => {
    const complete = d.key !== 'info' && isDayComplete(d.key) ? 'completed' : '';
    const active = currentDay === d.key ? 'active' : '';
    return `<div class="day-tab ${active} ${complete}" onclick="switchDay('${d.key}')"><span class="day-num">${d.num}</span>${d.label}</div>`;
  }).join('');

  const main = document.getElementById('main');
  if (currentDay === 'info') {
    main.innerHTML = `<div class="day-header"><div class="day-meta">PRINCIPLES / WEIGHTS / TIPS</div><h2 class="day-title">原则与<em>参考</em></h2></div>${PRINCIPLES_HTML}`;
    return;
  }

  const day = PLAN[currentDay];
  const prog = getDayProgress(currentDay);

  const warmupHTML = day.warmup.map((ex,i) => buildWarmupCard(ex, currentDay, i)).join('');
  const exerciseHTML = day.exercises.map((ex,i) => buildExerciseCard(ex, currentDay, i)).join('');
  const stretchHTML = day.stretches.map((ex,i) => buildStretchCard(ex, currentDay, i)).join('');

  main.innerHTML = `
    <div class="day-header">
      <div class="day-meta">${currentDay.toUpperCase()} / ${day.focus}</div>
      <h2 class="day-title">${day.title}</h2>
      <p class="day-sub">${day.sub}</p>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
        <span>${prog.done}/${prog.total}</span>
      </div>
    </div>
    <div class="section-divider warmup">训练前热身 · Warm Up</div>
    ${warmupHTML}
    <div class="section-divider main-workout">正式训练 · Main Workout</div>
    ${exerciseHTML}
    <div class="section-divider stretch">训练后拉伸 · Cool Down</div>
    ${stretchHTML}
  `;
}

render();
</script>
</body>
</html>
