<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>薄肌训练 v2 · 前臂修复版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0b;--bg-card:#131318;--bg-elevated:#1c1c24;
    --border:#26262f;--border-strong:#3a3a47;
    --text:#ebe9e4;--text-dim:#8b8a93;--text-faint:#595862;
    --accent:#a78bfa;--accent-dim:#a78bfa22;
    --warm:#fbbf24;--warm-dim:#fbbf2418;
    --stretch:#60a5fa;--stretch-dim:#60a5fa22;
    --success:#6ee787;--success-dim:#6ee78718;
    --fix:#f97316;--fix-dim:#f9731618;
    --serif:'Fraunces',Georgia,serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  body{min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
  .header{padding:calc(env(safe-area-inset-top)+16px) 20px 12px;background:var(--bg);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
  .header-row{display:flex;align-items:baseline;justify-content:space-between;}
  .title{font-family:var(--serif);font-weight:600;font-size:26px;letter-spacing:-0.02em;margin:0;font-variation-settings:'opsz' 144;}
  .title em{font-style:italic;color:var(--accent);}
  .version-badge{font-family:var(--mono);font-size:10px;color:var(--fix);background:var(--fix-dim);padding:3px 8px;border-radius:4px;border:1px solid var(--fix);letter-spacing:0.05em;}
  .date{font-family:var(--mono);font-size:11px;color:var(--text-faint);letter-spacing:0.05em;text-transform:uppercase;margin-top:4px;}
  .day-tabs{display:flex;gap:5px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex:1;min-width:0;padding:9px 6px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:var(--mono);font-size:9px;font-weight:500;cursor:pointer;transition:all 0.15s;text-align:center;}
  .day-tab .day-num{display:block;font-size:12px;color:var(--text);margin-bottom:2px;font-weight:600;}
  .day-tab.active{background:var(--accent);border-color:var(--accent);color:#0d0a1a;}
  .day-tab.active .day-num{color:#0d0a1a;}
  .day-tab.completed::after{content:'●';color:var(--success);margin-left:2px;font-size:7px;}
  .main{padding:20px;}
  .day-meta{font-family:var(--mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;}
  .day-title{font-family:var(--serif);font-size:28px;font-weight:500;line-height:1.1;letter-spacing:-0.02em;margin:0 0 14px;font-variation-settings:'opsz' 144;}
  .day-title em{color:var(--accent);font-style:italic;}
  .progress-row{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:11px;color:var(--text-dim);}
  .progress-bar{flex:1;height:4px;background:var(--bg-card);border-radius:2px;overflow:hidden;position:relative;}
  .progress-fill{position:absolute;inset:0;width:0%;background:var(--accent);transition:width 0.3s ease-out;border-radius:2px;}
  .fix-alert{background:var(--fix-dim);border:1px solid var(--fix);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
  .fix-alert-title{font-family:var(--mono);font-size:10px;color:var(--fix);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;}
  .fix-alert-text{font-size:13px;line-height:1.6;color:var(--text-dim);}
  .fix-alert-text strong{color:var(--fix);}
  .section-divider{display:flex;align-items:center;gap:12px;margin:22px 0 13px;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;}
  .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .section-divider.warmup{color:var(--warm);}
  .section-divider.stretch{color:var(--stretch);}
  .section-divider.main-workout{color:var(--accent);}
  .section-divider.cardio{color:var(--success);}
  .exercise{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;transition:border-color 0.2s;}
  .exercise.done{border-color:var(--success-dim);background:linear-gradient(180deg,var(--success-dim) 0%,var(--bg-card) 100%);}
  .exercise.warmup-card{border-color:rgba(251,191,36,0.25);background:linear-gradient(180deg,var(--warm-dim) 0%,var(--bg-card) 100%);}
  .exercise.warmup-card.done{border-color:var(--success-dim);background:linear-gradient(180deg,var(--success-dim) 0%,var(--bg-card) 100%);}
  .exercise.stretch-card{border-color:rgba(96,165,250,0.2);}
  .exercise.stretch-card.done{border-color:var(--success-dim);}
  .exercise.fix-card{border-color:rgba(249,115,22,0.3);background:linear-gradient(180deg,var(--fix-dim) 0%,var(--bg-card) 100%);}
  .exercise.fix-card.done{border-color:var(--success-dim);background:linear-gradient(180deg,var(--success-dim) 0%,var(--bg-card) 100%);}
  .exercise.cardio-card{border-color:rgba(110,231,135,0.25);background:linear-gradient(180deg,var(--success-dim) 0%,var(--bg-card) 100%);}
  .exercise.cardio-card.done{border-color:var(--success-dim);}
  .exercise-num{font-family:var(--mono);font-size:10px;color:var(--text-faint);letter-spacing:0.1em;margin-bottom:4px;}
  .exercise-name{font-family:var(--serif);font-size:18px;font-weight:500;line-height:1.25;letter-spacing:-0.01em;margin:0 0 4px;font-variation-settings:'opsz' 72;}
  .exercise-muscle{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;margin-bottom:10px;letter-spacing:0.05em;}
  .exercise-muscle.main{color:var(--accent);background:var(--accent-dim);}
  .exercise-muscle.warm{color:var(--warm);background:var(--warm-dim);}
  .exercise-muscle.cool{color:var(--stretch);background:var(--stretch-dim);}
  .exercise-muscle.fix{color:var(--fix);background:var(--fix-dim);}
  .exercise-muscle.green{color:var(--success);background:var(--success-dim);}
  .specs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .spec{background:var(--bg-elevated);padding:9px 11px;border-radius:8px;}
  .spec-label{font-family:var(--mono);font-size:9px;color:var(--text-faint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
  .spec-value{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:600;}
  .info-row{background:var(--bg-elevated);padding:11px;border-radius:8px;margin-bottom:12px;}
  .info-row.main{border-left:3px solid var(--accent);}
  .info-row.warm{border-left:3px solid var(--warm);}
  .info-row.cool{border-left:3px solid var(--stretch);}
  .info-row.fix{border-left:3px solid var(--fix);}
  .info-row.green{border-left:3px solid var(--success);}
  .info-row-label{font-family:var(--mono);font-size:9px;color:var(--text-faint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
  .info-row-value{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);line-height:1.5;}
  .actual-row{margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);display:flex;align-items:center;gap:8px;}
  .actual-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);flex-shrink:0;}
  .actual-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border-strong);color:var(--text);font-family:var(--mono);font-size:12px;padding:4px 0;outline:none;}
  .actual-input:focus{border-color:var(--accent);}
  .actual-input::placeholder{color:var(--text-faint);}
  .sets{display:flex;gap:8px;flex-wrap:wrap;}
  .set-btn{width:42px;height:42px;border-radius:10px;background:var(--bg-elevated);border:1px solid var(--border-strong);color:var(--text-dim);font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;user-select:none;}
  .set-btn:active{transform:scale(0.92);}
  .set-btn.done{background:var(--success);border-color:var(--success);color:#053d12;}
  .notes{font-family:var(--sans);font-size:12px;line-height:1.55;color:var(--text-dim);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-style:italic;}
  .info-block{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;}
  .info-block.highlight{border-color:var(--accent-dim);}
  .info-block.warn{border-color:rgba(251,191,36,0.25);}
  .info-block.fix-block{border-color:rgba(249,115,22,0.3);}
  .info-title{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:-0.01em;margin:0 0 10px;font-variation-settings:'opsz' 72;}
  .info-title em{color:var(--accent);font-style:italic;}
  .info-block ul{padding-left:16px;margin:6px 0;font-size:13px;line-height:1.7;color:var(--text-dim);}
  .info-block li{margin-bottom:4px;}
  .info-block li strong{color:var(--text);font-weight:600;}
  .info-block p{font-size:13px;line-height:1.65;color:var(--text-dim);margin:6px 0;}
  .info-block p strong{color:var(--text);font-weight:600;}
  .weight-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0;}
  .weight-table th{font-family:var(--mono);font-size:9px;color:var(--text-faint);letter-spacing:0.1em;text-transform:uppercase;padding:5px 7px;border-bottom:1px solid var(--border);text-align:left;}
  .weight-table td{padding:7px;border-bottom:1px solid var(--border);color:var(--text-dim);}
  .weight-table td:first-child{color:var(--text);font-size:12px;}
  .weight-table td:last-child{color:var(--accent);font-family:var(--mono);font-size:11px;font-weight:600;}
  .weight-table tr:last-child td{border-bottom:none;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:10px 0;}
  .week-day{text-align:center;padding:8px 2px;border-radius:8px;font-size:10px;}
  .week-day .wd-label{font-family:var(--mono);color:var(--text-faint);font-size:9px;margin-bottom:3px;}
  .week-day .wd-content{font-size:11px;line-height:1.3;}
  .week-day.strength{background:var(--accent-dim);border:1px solid rgba(167,139,250,0.3);}
  .week-day.strength .wd-content{color:var(--accent);}
  .week-day.cardio{background:var(--success-dim);border:1px solid rgba(110,231,135,0.3);}
  .week-day.cardio .wd-content{color:var(--success);}
  .week-day.rest{background:var(--bg-elevated);border:1px solid var(--border);}
  .week-day.rest .wd-content{color:var(--text-faint);}
  .footer{padding:20px 20px 30px;display:flex;gap:10px;border-top:1px solid var(--border);margin-top:24px;}
  .btn{flex:1;padding:13px;background:var(--bg-card);border:1px solid var(--border-strong);border-radius:10px;color:var(--text-dim);font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;}
  .btn:active{transform:scale(0.97);}
  .btn-danger{color:#ff6b6b;border-color:#ff6b6b40;}
</style>
</head>
<body>
<header class="header">
  <div class="header-row">
    <h1 class="title">薄肌<em>训练</em></h1>
    <span class="version-badge">前臂修复版 v2</span>
  </div>
  <div class="date" id="date"></div>
  <div class="day-tabs" id="dayTabs"></div>
</header>
<main class="main" id="main"></main>
<div class="footer">
  <button class="btn" onclick="resetDay()">重置本日</button>
  <button class="btn btn-danger" onclick="resetAll()">清空全部</button>
</div>
<script>
const PLAN = {
  day1: {
    title: '胸 + 核心',
    focus: '胸',
    cardioDay: true,
    fixNote: '胸日前臂酸的根因：哑铃握太死 + 手腕角度错误。解决：握杠时手腕保持中立（不背屈），想象"折断杠铃"来激活胸肌而不是靠握力。',
    warmup: [
      { name: '跑步机快走 / 慢跑', tag: '全身升温',
        info: '5分钟，速度5-6km/h，心率升到100-110bpm',
        sets:1, reps:'5分钟', notes:'先升温再练，肩袖保护必须' },
      { name: '⭐ 腕关节绕环 + 前臂拉伸', tag: '前臂 · 修复热身',
        info: '握拳后手腕顺逆时针各绕20圈。再用右手把左手手指向后翻，前臂内侧拉伸30秒，换手。这个动作专门解决胸日前臂紧张',
        sets:1, reps:'各20圈+30秒',
        notes: '★ 新增动作。胸日前臂酸软的修复从这里开始。做完后前臂应该感觉松弛发热' },
      { name: '手臂绕环', tag: '肩关节激活',
        info: '双臂向前绕大圈20次，再向后20次',
        sets:1, reps:'前后各20次', notes:'肩关节充分活动' },
      { name: '胸部弹振拉伸（动态）', tag: '胸肌预热',
        info: '双手在胸前交叉，快速向两侧展开弹振，感受胸大肌被拉开',
        sets:1, reps:'20次', notes:'动态拉伸，不是静止撑' },
      { name: '俯卧撑（热身组）', tag: '胸+肩预热',
        info: '注意：手掌外旋（手指指向斜外侧），不要让手腕向后弯。这个手位设置今天的腕关节模式',
        sets:2, reps:'10次', notes:'专注感受胸部发力，不是手臂支撑' },
      { name: '空杆 / 轻哑铃卧推（热身）', tag: '动作模式预热',
        info: '5kg哑铃做1组。重点：想象"挤压"哑铃往中间夹，激活胸肌神经连接。手腕保持中立，不向后弯',
        sets:1, reps:'15次', notes: '★ 告诉肌肉今天要做什么' },
    ],
    exercises: [
      { name: '哑铃平板卧推', muscle: '胸 主项',
        weight: '哑铃 12-14kg / 手（先从这个重量确认动作）',
        sets:4, reps:'8-10', rest:'90秒',
        notes:'★ 主项。手腕保持中立——用手掌"根部"（大鱼际）承力，不靠手指。肩胛收紧贴凳，下放感受胸拉伸，不借力弹胸。如果前臂酸先检查手腕是否在向后弯' },
      { name: '上斜哑铃卧推', muscle: '上胸',
        weight: '哑铃 8-10kg / 手',
        sets:3, reps:'10-12', rest:'90秒',
        notes:'凳子30°。上胸是薄肌轮廓的关键。同样保持手腕中立' },
      { name: '绳索夹胸 / 蝴蝶机', muscle: '胸 孤立收缩',
        weight: '绳索 8-10kg/单边 或 蝴蝶机 20-30kg',
        sets:3, reps:'12-15', rest:'60秒',
        notes:'末端充分挤压2秒。这个动作握力需求最低——感受最纯粹的胸肌收缩。不要借肩力' },
      { name: '双杠臂屈伸（身体前倾）', muscle: '下胸 + 三头',
        weight: '自重（先稳定再说加重）',
        sets:3, reps:'8-10', rest:'90秒',
        notes:'身体前倾15°刺激胸。双杠握法：虎口朝前，手腕垂直不内翻。下到大臂平行地面' },
      { name: '卷腹', muscle: '上腹',
        weight: '自重', sets:3, reps:'15-20', rest:'45秒',
        notes:'顶峰收缩，慢起慢放' },
      { name: '平板支撑', muscle: '核心稳定',
        weight: '自重', sets:3, reps:'45-60秒', rest:'45秒',
        notes:'收紧腹臀，身体一直线' },
    ],
    cardio: [
      { name: '快走 / 椭圆机 LISS', tag: '有氧 · 减脂',
        info: '力量训练完后做25-30分钟。速度：快走6km/h或椭圆机中等阻力。心率保持在最大心率60-70%（约125-135bpm）。这个强度燃脂最高效且不影响力量恢复',
        sets:1, reps:'25-30分钟',
        notes:'★ 力量训练后做有氧，而不是之前。有氧前做力量 = 力量质量最高，有氧效果最好' },
    ],
    stretches: [
      { name: '门框胸部拉伸', tag: '拉伸 · 胸部',
        info: '单臂屈肘抵住门框，身体前转',
        sets:2, reps:'30秒/边', notes:'★ 卧推后必拉' },
      { name: '⭐ 前臂屈肌拉伸', tag: '拉伸 · 前臂（修复）',
        info: '手臂向前伸直，手掌朝上，另一只手轻轻把手指向下翻转，感受前臂内侧拉伸。保持30秒，换手。这个拉伸解决胸日后的前臂酸软',
        sets:2, reps:'30秒/边',
        notes:'★ 新增。胸日后前臂修复必做。拉完会感觉前臂明显放松' },
      { name: '三角肌交叉拉伸', tag: '拉伸 · 肩部',
        info: '一只手水平横过胸前，另一只手压住肘部往身体拉',
        sets:2, reps:'30秒/边', notes:'肩部必拉' },
      { name: '三头肌头顶拉伸', tag: '拉伸 · 三头',
        info: '一只手举过头顶屈肘，另一只手压住肘部往后轻推',
        sets:2, reps:'30秒/边', notes:'手臂后侧拉伸感' },
    ]
  },

  day2: {
    title: '背阔 · 主导',
    focus: '背',
    cardioDay: true,
    fixNote: '背日前臂酸是最常见问题，根因是初学者握力比背阔力量弱。解决方案：① 热身加腕部激活 ② 用助力带（最重要！）③ 减少背日动作数量，专注质量。',
    warmup: [
      { name: '跑步机快走 / 慢跑', tag: '全身升温',
        info: '5分钟，速度5-6km/h。背日尤其要热身——冷肩引体是肩袖受伤主因',
        sets:1, reps:'5分钟', notes:'不能省' },
      { name: '⭐ 腕关节激活 + 握力热身', tag: '前臂 · 修复热身',
        info: '① 手腕顺逆时针绕环各20圈 ② 握拳用力10秒然后完全张开，重复10次 ③ 手臂下垂轻轻甩动前臂15秒放松。背日引体下拉全靠握力，必须先热起来',
        sets:1, reps:'完整做一遍',
        notes:'★ 新增。背日前臂酸的修复从这开始。做完手掌应该感觉发热' },
      { name: '肩部绕环（大幅度）', tag: '肩关节激活',
        info: '双臂交替绕大圈，前后各20次。再做耸肩10次',
        sets:1, reps:'前后各20次', notes:'减少引体时肩袖撞击风险' },
      { name: '猫牛式', tag: '脊柱激活',
        info: '四肢着地，吸气腰下沉抬头（牛式），呼气拱背低头（猫式），交替',
        sets:1, reps:'10个来回', notes:'背日最重要热身，激活脊柱深层肌肉' },
      { name: '弹力带直臂下压（背阔激活）', tag: '背阔 · 神经激活',
        info: '弹力带绕手腕，直臂从头顶向下压到大腿前侧，只靠背阔发力，前臂不参与',

      <li><strong>腹肌出来的唯一路：</strong>体脂降到15%以下。饮食比训练更重要</li>
      <li><strong>你的目标时间线：</strong>20-25%降到15%大约需要5-8个月，每周减0.3-0.5kg体重</li>
    </ul>
  </div>
`;

let state = loadState();
let currentDay = state.currentDay || 'day1';

function loadState() {
  try { const s = localStorage.getItem('slimV2State'); return s ? JSON.parse(s) : { warmup:{}, exercises:{}, stretches:{}, cardio:{}, weights:{}, currentDay:'day1' }; }
  catch(e) { return { warmup:{}, exercises:{}, stretches:{}, cardio:{}, weights:{}, currentDay:'day1' }; }
}
function saveState() { try { localStorage.setItem('slimV2State', JSON.stringify(state)); } catch(e){} }

function toggleItem(section, dayKey, idx, setIdx) {
  const key = `${section}_${dayKey}_${idx}_${setIdx}`;
  if (!state[section]) state[section] = {};
  state[section][key] = !state[section][key];
  saveState(); render();
}
function isItemDone(section, dayKey, idx, setIdx) {
  if (!state[section]) return false;
  return !!state[section][`${section}_${dayKey}_${idx}_${setIdx}`];
}
function saveWeight(dayKey, section, idx, value) {
  state.weights[`${dayKey}_${section}_${idx}`] = value;
  saveState();
}
function getWeight(dayKey, section, idx) {
  return state.weights[`${dayKey}_${section}_${idx}`] || '';
}
function switchDay(day) { currentDay = day; state.currentDay = day; saveState(); render(); window.scrollTo({top:0,behavior:'smooth'}); }
function resetDay() {
  if (!confirm('重置本日所有记录？')) return;
  ['warmup','exercises','stretches','cardio'].forEach(sec => {
    if (state[sec]) Object.keys(state[sec]).forEach(k => { if(k.includes(`_${currentDay}_`)) delete state[sec][k]; });
  });
  saveState(); render();
}
function resetAll() {
  if (!confirm('清空全部数据？')) return;
  state = { warmup:{}, exercises:{}, stretches:{}, cardio:{}, weights:{}, currentDay:'day1' };
  saveState(); currentDay = 'day1'; render();
}

function isDayComplete(dayKey) {
  const day = PLAN[dayKey];
  const allItems = [
    ...day.warmup.map((_,i) => ({sec:'warmup',i,sets:1})),
    ...day.exercises.map((_,i) => ({sec:'exercises',i,sets:_.sets})),
    ...day.stretches.map((_,i) => ({sec:'stretches',i,sets:_.sets})),
    ...(day.cardio||[]).map((_,i) => ({sec:'cardio',i,sets:1})),
  ];
  for (const item of allItems) {
    for (let s = 0; s < item.sets; s++) {
      if (!isItemDone(item.sec, dayKey, item.i, s)) return false;
    }
  }
  return allItems.length > 0;
}

function getDayProgress(dayKey) {
  const day = PLAN[dayKey];
  let total = 0, done = 0;
  const count = (arr, sec) => arr.forEach((ex,i) => {
    const sets = ex.sets || 1;
    for (let s = 0; s < sets; s++) { total++; if (isItemDone(sec, dayKey, i, s)) done++; }
  });
  count(day.warmup, 'warmup');
  count(day.exercises, 'exercises');
  count(day.stretches, 'stretches');
  count(day.cardio||[], 'cardio');
  return { done, total, pct: total ? (done/total*100) : 0 };
}

function buildWarmupCard(ex, dayKey, idx) {
  const done = isItemDone('warmup', dayKey, idx, 0);
  const val = getWeight(dayKey, 'warmup', idx);
  const isFix = ex.name.includes('⭐');
  return `<div class="exercise ${isFix?'fix-card':'warmup-card'} ${done?'done':''}">
    <div class="exercise-num">WARM-UP ${String(idx+1).padStart(2,'0')}</div>
    <h3 class="exercise-name">${ex.name}</h3>
    <span class="exercise-muscle ${isFix?'fix':'warm'}">${ex.tag}</span>
    <div class="specs">
      <div class="spec"><div class="spec-label">数量</div><div class="spec-value">${ex.reps}</div></div>
      <div class="spec"><div class="spec-label">完成标记</div><div class="spec-value">—</div></div>
    </div>
    <div class="info-row ${isFix?'fix':'warm'}">
      <div class="info-row-label">做法</div>
      <div class="info-row-value" style="font-weight:400;color:var(--text-dim);font-family:var(--sans);font-size:12px;line-height:1.6">${ex.info}</div>
      <div class="actual-row">
        <span class="actual-label">备注：</span>
        <input class="actual-input" type="text" placeholder="记录（可选）" value="${val}" oninput="saveWeight('${dayKey}','warmup',${idx},this.value)">
      </div>
    </div>
    <div class="sets"><button class="set-btn ${done?'done':''}" onclick="toggleItem('warmup','${dayKey}',${idx},0)">✓</button></div>
    <div class="notes">${ex.notes}</div>
  </div>`;
}

function buildExerciseCard(ex, dayKey, idx) {
  let allDone = true;
  const btns = [];
  for (let s = 0; s < ex.sets; s++) {
    const done = isItemDone('exercises', dayKey, idx, s);
    if (!done) allDone = false;
    btns.push(`<button class="set-btn ${done?'done':''}" onclick="toggleItem('exercises','${dayKey}',${idx},${s})">${s+1}</button>`);
  }
  const val = getWeight(dayKey, 'exercises', idx);
  return `<div class="exercise ${allDone?'done':''}">
    <div class="exercise-num">EXERCISE ${String(idx+1).padStart(2,'0')}</div>
    <h3 class="exercise-name">${ex.name}</h3>
    <span class="exercise-muscle main">${ex.muscle}</span>
    <div class="specs">
      <div class="spec"><div class="spec-label">组数 × 次数</div><div class="spec-value">${ex.sets} × ${ex.reps}</div></div>
      <div class="spec"><div class="spec-label">组间休息</div><div class="spec-value">${ex.rest}</div></div>
    </div>
    <div class="info-row main">
      <div class="info-row-label">推荐重量（初学修订版）</div>
      <div class="info-row-value">${ex.weight}</div>
      <div class="actual-row">
        <span class="actual-label">今天用：</span>
        <input class="actual-input" type="text" placeholder="如：12kg × 10次" value="${val}" oninput="saveWeight('${dayKey}','exercises',${idx},this.value)">
      </div>
    </div>
    <div class="sets">${btns.join('')}</div>
    <div class="notes">${ex.notes}</div>
  </div>`;
}

function buildCardioCard(ex, dayKey, idx) {
  const done = isItemDone('cardio', dayKey, idx, 0);
  const val = getWeight(dayKey, 'cardio', idx);
  return `<div class="exercise cardio-card ${done?'done':''}">
    <div class="exercise-num">CARDIO ${String(idx+1).padStart(2,'0')}</div>
    <h3 class="exercise-name">${ex.name}</h3>
    <span class="exercise-muscle green">${ex.tag}</span>
    <div class="specs">
      <div class="spec"><div class="spec-label">时长</div><div class="spec-value">${ex.reps}</div></div>
      <div class="spec"><div class="spec-label">心率目标</div><div class="spec-value">125-135bpm</div></div>
    </div>
    <div class="info-row green">
      <div class="info-row-label">执行方式</div>
      <div class="info-row-value" style="font-weight:400;color:var(--text-dim);font-family:var(--sans);font-size:12px;line-height:1.6">${ex.info}</div>
      <div class="actual-row">
        <span class="actual-label">记录：</span>
        <input class="actual-input" type="text" placeholder="时间/消耗（可选）" value="${val}" oninput="saveWeight('${dayKey}','cardio',${idx},this.value)">
      </div>
    </div>
    <div class="sets"><button class="set-btn ${done?'done':''}" onclick="toggleItem('cardio','${dayKey}',${idx},0)">✓</button></div>
    <div class="notes">${ex.notes}</div>
  </div>`;
}

function buildStretchCard(ex, dayKey, idx) {
  let allDone = true;
  const btns = [];
  for (let s = 0; s < ex.sets; s++) {
    const done = isItemDone('stretches', dayKey, idx, s);
    if (!done) allDone = false;
    btns.push(`<button class="set-btn ${done?'done':''}" onclick="toggleItem('stretches','${dayKey}',${idx},${s})">${s+1}</button>`);
  }
  const val = getWeight(dayKey, 'stretches', idx);
  const isFix = ex.name.includes('⭐');
  return `<div class="exercise stretch-card ${isFix?'fix-card':''} ${allDone?'done':''}">
    <div class="exercise-num">STRETCH ${String(idx+1).padStart(2,'0')}</div>
    <h3 class="exercise-name">${ex.name}</h3>
    <span class="exercise-muscle ${isFix?'fix':'cool'}">${ex.tag}</span>
    <div class="specs">
      <div class="spec"><div class="spec-label">次数 × 时长</div><div class="spec-value">${ex.sets} × ${ex.reps}</div></div>
      <div class="spec"><div class="spec-label">说明</div><div class="spec-value">—</div></div>
    </div>
    <div class="info-row ${isFix?'fix':'cool'}">
      <div class="info-row-label">拉伸方法</div>
      <div class="info-row-value" style="font-weight:400;color:var(--text-dim);font-family:var(--sans);font-size:12px;line-height:1.6">${ex.info}</div>
      <div class="actual-row">
        <span class="actual-label">感受：</span>
        <input class="actual-input" type="text" placeholder="记录拉伸感受" value="${val}" oninput="saveWeight('${dayKey}','stretches',${idx},this.value)">
      </div>
    </div>
    <div class="sets">${btns.join('')}</div>
    <div class="notes">${ex.notes}</div>
  </div>`;
}

function render() {
  const d = new Date();
  document.getElementById('date').textContent = `${d.getMonth()+1}月${d.getDate()}日 · 周${'日一二三四五六'[d.getDay()]}`;
  const days = [
    {key:'day1',label:'推+氧',num:'Day 1'},
    {key:'day2',label:'拉+氧',num:'Day 2'},
    {key:'day3',label:'腿',num:'Day 3'},
    {key:'day4',label:'肩臂',num:'Day 4'},
    {key:'info',label:'原则',num:'Info'},
  ];
  document.getElementById('dayTabs').innerHTML = days.map(d => {
    const complete = d.key !== 'info' && isDayComplete(d.key) ? 'completed' : '';
    const active = currentDay === d.key ? 'active' : '';
    return `<div class="day-tab ${active} ${complete}" onclick="switchDay('${d.key}')"><span class="day-num">${d.num}</span>${d.label}</div>`;
  }).join('');

  const main = document.getElementById('main');
  if (currentDay === 'info') {
    main.innerHTML = `<div class="day-meta">PRINCIPLES / FIX / SCHEDULE</div><h2 class="day-title">原则与<em>修复</em></h2>${PRINCIPLES_HTML}`;
    return;
  }

  const day = PLAN[currentDay];
  const prog = getDayProgress(currentDay);
  const warmupHTML = day.warmup.map((ex,i) => buildWarmupCard(ex, currentDay, i)).join('');
  const exerciseHTML = day.exercises.map((ex,i) => buildExerciseCard(ex, currentDay, i)).join('');
  const cardioHTML = (day.cardio||[]).map((ex,i) => buildCardioCard(ex, currentDay, i)).join('');
  const stretchHTML = day.stretches.map((ex,i) => buildStretchCard(ex, currentDay, i)).join('');

  const fixAlertHTML = day.fixNote ? `<div class="fix-alert"><div class="fix-alert-title">⭐ 前臂修复提示</div><div class="fix-alert-text">${day.fixNote}</div></div>` : '';

  main.innerHTML = `
    <div class="day-meta">${currentDay.toUpperCase()} / ${day.focus}</div>
    <h2 class="day-title">${day.title.replace(day.focus,'<em>'+day.focus+'</em>')}</h2>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
      <span>${prog.done}/${prog.total}</span>
    </div>
    <div style="margin-top:14px">${fixAlertHTML}</div>
    <div class="section-divider warmup">训练前热身 · Warm Up</div>
    ${warmupHTML}
    <div class="section-divider main-workout">正式训练 · Main Workout</div>
    ${exerciseHTML}
    ${cardioHTML ? `<div class="section-divider cardio">有氧 · Cardio（力量后）</div>${cardioHTML}` : ''}
    <div class="section-divider stretch">训练后拉伸 · Cool Down</div>
    ${stretchHTML}
  `;
}

render();
</script>
</body>
</html>
