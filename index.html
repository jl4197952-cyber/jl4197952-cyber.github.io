<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="徒手训练">
<title>徒手训练日志</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-card: #131318;
    --bg-elevated: #1c1c24;
    --border: #26262f;
    --border-strong: #3a3a47;
    --text: #ebe9e4;
    --text-dim: #8b8a93;
    --text-faint: #595862;
    --accent: #4ade80;
    --accent-dim: #4ade8028;
    --stretch: #60a5fa;
    --stretch-dim: #60a5fa22;
    --cardio: #fbbf24;
    --cardio-dim: #fbbf2422;
    --success: #6ee787;
    --success-dim: #6ee78718;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

  .header {
    padding: calc(env(safe-area-inset-top) + 16px) 20px 12px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; }
  .title { font-family: var(--serif); font-weight: 600; font-size: 28px; letter-spacing: -0.02em; margin: 0; font-variation-settings: 'opsz' 144; }
  .title em { font-style: italic; color: var(--accent); font-weight: 500; }
  .date { font-family: var(--mono); font-size: 11px; color: var(--text-faint); letter-spacing: 0.05em; text-transform: uppercase; }

  .day-tabs { display: flex; gap: 6px; margin-top: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 1; min-width: 0; padding: 10px 12px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-dim); font-family: var(--mono); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: center; letter-spacing: 0.02em;
  }
  .day-tab .day-num { display: block; font-size: 14px; color: var(--text); margin-bottom: 2px; font-weight: 600; }
  .day-tab.active { background: var(--accent); border-color: var(--accent); color: #052e1a; }
  .day-tab.active .day-num { color: #052e1a; }
  .day-tab.completed::after { content: '●'; color: var(--success); margin-left: 4px; font-size: 8px; }

  .main { padding: 20px; }

  .day-header { margin-bottom: 18px; }
  .day-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .day-title { font-family: var(--serif); font-size: 32px; font-weight: 500; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 14px; font-variation-settings: 'opsz' 144; }
  .day-title em { color: var(--accent); font-style: italic; }

  .progress-row { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .progress-bar { flex: 1; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; position: relative; }
  .progress-fill { position: absolute; inset: 0; width: 0%; background: var(--accent); transition: width 0.3s ease-out; border-radius: 2px; }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stretch);
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .exercise { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; margin-bottom: 12px; transition: border-color 0.2s; }
  .exercise.done { border-color: var(--success-dim); background: linear-gradient(180deg, var(--success-dim) 0%, var(--bg-card) 100%); }
  .exercise.stretch { border-color: rgba(96, 165, 250, 0.2); }
  .exercise.stretch.done { border-color: var(--success-dim); }
  .exercise-num { font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; margin-bottom: 4px; }
  .exercise-name { font-family: var(--serif); font-size: 20px; font-weight: 500; line-height: 1.25; letter-spacing: -0.01em; margin: 0 0 4px; font-variation-settings: 'opsz' 72; }
  .exercise-muscle { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 2px 7px; border-radius: 4px; margin-bottom: 12px; letter-spacing: 0.05em; }
  .exercise.stretch .exercise-muscle { color: var(--stretch); background: var(--stretch-dim); }

  .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .spec { background: var(--bg-elevated); padding: 10px 12px; border-radius: 8px; }
  .spec-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .spec-value { font-family: var(--mono); font-size: 14px; color: var(--text); font-weight: 600; }

  .variation-row { background: var(--bg-elevated); padding: 12px; border-radius: 8px; margin-bottom: 14px; border-left: 3px solid var(--accent); }
  .exercise.stretch .variation-row { border-left-color: var(--stretch); }
  .variation-label { font-family: var(--mono); font-size: 9px; color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .variation-list { font-family: var(--sans); font-size: 12px; line-height: 1.6; color: var(--text-dim); }
  .variation-list .level { color: var(--text); font-weight: 600; }
  .variation-list .arrow { color: var(--text-faint); margin: 0 4px; }
  .actual-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; align-items: center; gap: 8px; }
  .actual-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
  .actual-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border-strong); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 4px 0; outline: none; }
  .actual-input:focus { border-color: var(--accent); }
  .actual-input::placeholder { color: var(--text-faint); }

  .sets { display: flex; gap: 8px; flex-wrap: wrap; }
  .set-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--bg-elevated); border: 1px solid var(--border-strong); color: var(--text-dim); font-family: var(--mono); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; user-select: none; }
  .set-btn:active { transform: scale(0.92); }
  .set-btn.done { background: var(--success); border-color: var(--success); color: #053d12; }

  .notes { font-family: var(--sans); font-size: 12px; line-height: 1.5; color: var(--text-dim); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-style: italic; }

  .info-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .info-block.highlight { border-color: var(--accent-dim); }
  .info-block.cardio-block { border-color: rgba(251, 191, 36, 0.25); }
  .info-title { font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 10px; }
  .info-title em { color: var(--accent); font-style: italic; }
  .info-title em.cardio { color: var(--cardio); }
  .info-block ul { padding-left: 18px; margin: 8px 0; font-size: 14px; line-height: 1.7; color: var(--text-dim); }
  .info-block li { margin-bottom: 4px; }
  .info-block li strong { color: var(--text); font-weight: 600; }
  .info-block p { font-size: 14px; line-height: 1.65; color: var(--text-dim); margin: 8px 0; }
  .info-block p strong { color: var(--text); font-weight: 600; }

  .macro-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-family: var(--mono); font-size: 12px; }
  .macro-table th, .macro-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border); }
  .macro-table th { color: var(--text-faint); font-weight: 500; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
  .macro-table td { color: var(--text-dim); }
  .macro-table td.label { text-align: left; color: var(--text); font-weight: 600; }
  .macro-table tr.training { background: rgba(74, 222, 128, 0.05); }
  .macro-table tr.training td.label { color: var(--accent); }

  .timeline { margin: 8px 0; }
  .timeline-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-time { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 600; flex-shrink: 0; width: 70px; }
  .timeline-content { font-size: 13px; color: var(--text-dim); flex: 1; }
  .timeline-content strong { color: var(--text); display: block; margin-bottom: 2px; }
  .timeline-content .meal-detail { font-size: 12px; line-height: 1.5; color: var(--text-dim); margin-top: 4px; }
  .timeline-item.star .timeline-time { color: #fbbf24; }
  .timeline-item.workout .timeline-time { color: #f87171; }
  .timeline-item.cardio .timeline-time { color: var(--cardio); }

  .meal-block { background: var(--bg-elevated); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
  .meal-block.star { border-left-color: #fbbf24; }
  .meal-block h4 { font-family: var(--serif); font-size: 15px; margin: 0 0 4px; color: var(--text); font-weight: 600; }
  .meal-block .meal-time { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-bottom: 8px; }
  .meal-block ul { margin: 4px 0 0; padding-left: 18px; font-size: 13px; }
  .meal-block ul li { margin-bottom: 2px; }
  .meal-block .meal-cal { font-family: var(--mono); font-size: 10px; color: var(--accent); margin-top: 6px; letter-spacing: 0.05em; }
  .meal-block .day-variant { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 1px 6px; border-radius: 3px; margin: 4px 4px 4px 0; }
  .meal-block .day-variant.training { color: var(--accent); background: var(--accent-dim); }
  .meal-block .day-variant.rest { color: var(--text-dim); background: var(--bg-card); }

  .footer { padding: 24px 20px 32px; display: flex; gap: 10px; border-top: 1px solid var(--border); margin-top: 30px; }
  .btn { flex: 1; padding: 14px; background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 10px; color: var(--text-dim); font-family: var(--mono); font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn-danger { color: #ff6b6b; border-color: #ff6b6b40; }
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <h1 class="title">徒手<em>训练</em></h1>
    <span class="date" id="date"></span>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>

<main class="main" id="main"></main>

<div class="footer">
  <button class="btn" onclick="resetDay()">重置本日</button>
  <button class="btn btn-danger" onclick="resetAll()">清空全部</button>
</div>

<script>
const PLAN = {
  day1: {
    title: '推 · 胸 / 肩 / 三头',
    focus: '推',
    exercises: [
      { 
        name: '双杠臂屈伸', 
        muscle: '胸 + 三头 主项',
        variation: '<span class="level">L1</span> 跳起负重慢放（4 秒下放）<span class="arrow">→</span> <span class="level">L2</span> 标准双杠 <span class="arrow">→</span> <span class="level">L3</span> 慢节奏（3秒下/1秒停） <span class="arrow">→</span> <span class="level">L4</span> 负重双杠（背包加书）',
        sets: 4, reps: '6-10', rest: '90秒', 
        notes: '身体微前倾刺激胸，垂直则刺激三头。下到大臂与地面平行' 
      },
      { 
        name: '俯卧撑', 
        muscle: '胸 + 三头',
        variation: '<span class="level">L1</span> 跪姿俯卧撑 <span class="arrow">→</span> <span class="level">L2</span> 标准俯卧撑 <span class="arrow">→</span> <span class="level">L3</span> 钻石俯卧撑 <span class="arrow">→</span> <span class="level">L4</span> 弓箭手俯卧撑 <span class="arrow">→</span> <span class="level">L5</span> 单臂俯卧撑',
        sets: 4, reps: '12-15', rest: '60秒', 
        notes: '身体一直线，胸离地一拳。能做满 15 次就升级到下一变式' 
      },
      { 
        name: '派克俯卧撑', 
        muscle: '肩 主项',
        variation: '<span class="level">L1</span> 标准派克（屁股翘高呈倒 V） <span class="arrow">→</span> <span class="level">L2</span> 脚抬高派克（脚放台阶/凳子上） <span class="arrow">→</span> <span class="level">L3</span> 靠墙倒立俯卧撑',
        sets: 3, reps: '8-12', rest: '60秒', 
        notes: '★ 这是徒手练肩的关键动作。头点地，控制下放' 
      },
      { 
        name: '上斜俯卧撑（双杠上）', 
        muscle: '胸 收尾',
        variation: '<span class="level">手放双杠上</span>，脚在地上，做俯卧撑。<br>难度调节：双脚距离双杠越远越简单',
        sets: 3, reps: '力竭', rest: '60秒', 
        notes: '做到做不动为止，泵感收尾' 
      },
      { 
        name: '平板支撑', 
        muscle: '核心',
        variation: '<span class="level">L1</span> 标准平板 <span class="arrow">→</span> <span class="level">L2</span> 单腿抬起平板 <span class="arrow">→</span> <span class="level">L3</span> 侧平板（左右各做）',
        sets: 3, reps: '45-60秒', rest: '45秒', 
        notes: '收紧腹臀，身体一直线，别塌腰' 
      },
      {
        name: '门框胸部拉伸',
        muscle: '拉伸 · 胸部',
        isStretch: true,
        variation: '找一面墙或门框，单臂屈肘呈 90 度抵住边框，身体前转远离手臂，胸部应有明显拉伸感',
        sets: 2, reps: '30秒 / 边', rest: '—',
        notes: '★ 练完胸最重要的拉伸，长期不拉胸会含胸驼背'
      },
      {
        name: '三头肌头顶拉伸',
        muscle: '拉伸 · 三头',
        isStretch: true,
        variation: '一只手举过头顶屈肘，让手摸到对侧肩胛骨；另一只手压住屈肘的肘部往后/往下拉',
        sets: 2, reps: '30秒 / 边', rest: '—',
        notes: '感觉手臂后侧（三头）有拉伸感'
      },
      {
        name: '三角肌交叉拉伸',
        muscle: '拉伸 · 肩部',
        isStretch: true,
        variation: '一只手水平横过胸前，另一只手压住肘部往身体方向拉，肩部应有拉伸感',
        sets: 2, reps: '30秒 / 边', rest: '—',
        notes: '肩部和后背交界处应有明显拉伸'
      },
    ]
  },
  day2: {
    title: '拉 · 背 / 二头',
    focus: '拉',
    exercises: [
      { 
        name: '正握引体向上（宽于肩）', 
        muscle: '背阔 主项',
        variation: '<span class="level">L1</span> 跳起慢放（4 秒下放） <span class="arrow">→</span> <span class="level">L2</span> 标准引体 <span class="arrow">→</span> <span class="level">L3</span> 慢节奏引体 <span class="arrow">→</span> <span class="level">L4</span> 负重引体',
        sets: 4, reps: '力竭（目标 6-10）', rest: '120秒', 
        notes: '★ 先肩胛下沉（耳朵远离肩），再用背阔启动。下巴过杆，不甩' 
      },
      { 
        name: '反握引体向上（窄于肩）', 
        muscle: '背 + 二头',
        variation: '<span class="level">L1</span> 跳起慢放 <span class="arrow">→</span> <span class="level">L2</span> 标准反握引体 <span class="arrow">→</span> <span class="level">L3</span> 慢节奏反握',
        sets: 3, reps: '8-10', rest: '90秒', 
        notes: '二头刺激更强。但二头每周练这一项就够，别另外加弯举' 
      },
      { 
        name: '澳式划船（身体在单杠下方）', 
        muscle: '背 厚度',
        variation: '<span class="level">L1</span> 膝盖弯曲，身体倾斜 45° <span class="arrow">→</span> <span class="level">L2</span> 双腿伸直水平 <span class="arrow">→</span> <span class="level">L3</span> 脚抬高（放凳子上）',
        sets: 3, reps: '12-15', rest: '60秒', 
        notes: '胸触杆，身体绷直。拉到胸口下方，不是脖子' 
      },
      { 
        name: '单杠悬垂举腿', 
        muscle: '下腹 + 核心',
        variation: '<span class="level">L1</span> 悬垂屈膝抬腿 <span class="arrow">→</span> <span class="level">L2</span> 悬垂直腿到 90° <span class="arrow">→</span> <span class="level">L3</span> 悬垂直腿到杆',
        sets: 3, reps: '12-15', rest: '60秒', 
        notes: '控制下放，别甩腿借力' 
      },
      { 
        name: '死悬挂', 
        muscle: '握力 + 肩稳定',
        variation: '<span class="level">L1</span> 双手悬挂 30 秒 <span class="arrow">→</span> <span class="level">L2</span> 双手悬挂 45-60 秒 <span class="arrow">→</span> <span class="level">L3</span> 单手悬挂',
        sets: 3, reps: '30-45秒', rest: '60秒', 
        notes: '撑到掉为止。握力是引体进阶的瓶颈，要专项练' 
      },
      {
        name: '婴儿式',
        muscle: '拉伸 · 背阔',
        isStretch: true,
        variation: '跪坐在地上，前额触地，双手向前伸到最远，手指尖向前发力，感受整个背阔肌的延展',
        sets: 2, reps: '45秒', rest: '—',
        notes: '★ 练完背最重要的拉伸，整个背部能放松'
      },
      {
        name: '二头肌墙壁拉伸',
        muscle: '拉伸 · 二头',
        isStretch: true,
        variation: '侧身贴墙站立，手掌贴墙（手指朝后），慢慢旋转身体远离墙壁，二头有强烈拉伸',
        sets: 2, reps: '30秒 / 边', rest: '—',
        notes: '感觉前臂内侧到二头有拉伸感'
      },
      {
        name: '颈部侧拉伸',
        muscle: '拉伸 · 颈肩',
        isStretch: true,
        variation: '右手绕过头顶轻拉左侧头部，让左耳靠近右肩，感受左侧颈部到肩的拉伸',
        sets: 1, reps: '30秒 / 边', rest: '—',
        notes: '引体后颈肩容易紧张，必拉'
      },
    ]
  },
  day3: {
    title: '腿 + 核心',
    focus: '腿',
    exercises: [
      { 
        name: '保加利亚分腿蹲', 
        muscle: '腿 + 臀 主项',
        variation: '<span class="level">L1</span> 标准保加利亚（后腿放台阶） <span class="arrow">→</span> <span class="level">L2</span> 慢节奏（3秒下） <span class="arrow">→</span> <span class="level">L3</span> 单腿手枪蹲（无支撑）',
        sets: 4, reps: '12 / 腿', rest: '90秒', 
        notes: '★ 徒手练腿之王。后腿放凳子或台阶上，前腿主导发力' 
      },
      {

      <li><strong>睡眠总长保证 8 小时</strong> — 3:30 睡到 13:30，时长比时间点更重要</li>
      <li><strong>起床后晒 15 分钟太阳</strong> — 调节生物钟，对抗夜班引起的褪黑素紊乱</li>
      <li><strong>睡前 1 小时不看强光手机</strong> — 蓝光会打乱褪黑素分泌</li>
      <li><strong>水分</strong>：上班时间至少喝 1.5L 水，训练时再喝 500ml</li>
      <li><strong>训练后蛋白粉不可省</strong> — 你的训练到晚餐间隔 3 小时，必须补蛋白防止肌肉分解</li>
    </ul>
  </div>

  <div class="info-block">
    <h2 class="info-title">关于<em>拉伸</em></h2>
    <p>每个训练日末尾都加了对应部位的拉伸。看到 <strong style="color:#60a5fa">蓝色「拉伸」标签</strong> 就是这部分。</p>
    <p><strong>为什么必须拉伸</strong>：</p>
    <ul>
      <li>训练后肌肉处于紧张缩短状态，不拉伸会逐渐丧失柔韧性</li>
      <li>长期不拉胸 → 含胸驼背；不拉腿 → 髋关节僵硬 → 引起腰痛</li>
      <li>拉伸能加速恢复、减少酸痛、降低受伤风险</li>
    </ul>
    <p><strong>怎么拉</strong>：</p>
    <ul>
      <li>每个动作保持 <strong>30-45 秒</strong>，不要弹震</li>
      <li>拉到"轻微不适但能忍受"的程度，不是疼痛</li>
      <li>正常呼吸，吐气时尝试再深一点</li>
      <li>切忌：练完直接走人不拉伸</li>
    </ul>
  </div>

  <div class="info-block">
    <h2 class="info-title">徒手训练<em>怎么进阶</em></h2>
    <p>没有"加重量"的概念 — 通过 <strong>更难的动作变式</strong> 来增加难度。每个动作都标了 L1 → L2 → L3 的难度递进。</p>
    <p><strong>升级规则</strong>：当一个动作能稳定做满目标次数的<strong>上限</strong> × <strong>全部组数</strong>，就升级到下一变式。例如：标准俯卧撑能稳定 4×15，下次改做钻石俯卧撑。</p>
    <p><strong>退阶规则</strong>：升级后做不到目标次数下限？退回前一档，把组数加一组。</p>
  </div>

  <div class="info-block">
    <h2 class="info-title">两大<em>核心动作</em></h2>
    <p><strong>引体向上 + 双杠臂屈伸</strong> = 徒手训练的"卧推 + 深蹲"。这两个动作的进阶速度决定你整体的训练成果。</p>
    <p>每周保证它们各练 2 次（Day 1+4 双杠；Day 2+4 引体），3 个月你的背和胸会有肉眼可见的变化。</p>
  </div>

  <div class="info-block">
    <h2 class="info-title">引体<em>做不够数</em>？</h2>
    <ul>
      <li><strong>跳起慢放</strong>：跳上去，下巴在杆上，然后用 4 秒慢慢下放</li>
      <li><strong>澳式划船加量</strong>：把澳式从 3 组加到 4-5 组</li>
      <li><strong>死悬挂练握力</strong>：握力差是引体的隐藏瓶颈</li>
      <li>坚持 3 周，引体次数会明显涨</li>
    </ul>
  </div>

  <div class="info-block">
    <h2 class="info-title">为什么<em>不练手臂孤立</em></h2>
    <p>引体已经狠狠练了二头，双杠已经狠狠练了三头。徒手没有耸肩、直立划船等动作，斜方肌自然不会过度发达。</p>
    <p>你想要的"均衡轮廓"，按这个计划做就是。<strong>不要另外加弯举或臂屈伸专项训练</strong>。</p>
  </div>

  <div class="info-block">
    <h2 class="info-title">必须<em>做的事</em></h2>
    <ul>
      <li>训练前热身 <strong>5-8 分钟</strong>（关节绕环 + 几组俯卧撑预热）</li>
      <li>训练后 <strong>必拉伸</strong>（已加入计划末尾，不要跳过）</li>
      <li>非训练日 <strong>必做低强度有氧</strong> 30-40 分钟</li>
      <li>每天睡足 <strong>8 小时</strong>（你的情况就是 3:30-13:30）</li>
      <li>每周固定时间称重 1 次</li>
      <li>每月拍照 1 次（镜子不会骗你）</li>
      <li>记录每次用的变式难度，进步看得见</li>
    </ul>
  </div>

  <div class="info-block">
    <h2 class="info-title">公园训练<em>小贴士</em></h2>
    <ul>
      <li><strong>带条毛巾</strong>：擦汗 / 垫平板支撑 / 包杠（如果杠太粗）</li>
      <li><strong>带瓶水</strong>：脱水会让你少做 30% 的次数</li>
      <li><strong>避开 22:00 后</strong>：太晚扰民，公园也可能关灯</li>
      <li><strong>下雨天</strong>：可以转室内做俯卧撑/深蹲/平板，单双杠动作跳过即可，下次补</li>
    </ul>
  </div>

  <div class="info-block highlight">
    <h2 class="info-title">预期<em>时间表</em></h2>
    <ul>
      <li><strong>1 个月</strong>：体重 -2kg，体能明显提升，动作变标准</li>
      <li><strong>2-3 个月</strong>：肩背宽度显出，体脂降到 22% 左右</li>
      <li><strong>4-5 个月</strong>：腹肌轮廓出现，体脂 16-17%</li>
      <li><strong>6 个月</strong>：薄肌身材达成 ✅ 体重 70-72kg / 体脂 13-15%</li>
    </ul>
    <p style="margin-top:10px;font-style:italic;color:var(--text-faint)">前提：饮食 + 训练 + 有氧 + 睡眠四件事都不偷懒</p>
  </div>
`;

let state = loadState();
let currentDay = state.currentDay || 'day1';

function loadState() {
  try {
    const s = localStorage.getItem('parkWorkoutState');
    return s ? JSON.parse(s) : { sets: {}, weights: {}, currentDay: 'day1' };
  } catch (e) { return { sets: {}, weights: {}, currentDay: 'day1' }; }
}
function saveState() {
  try { localStorage.setItem('parkWorkoutState', JSON.stringify(state)); } catch (e) {}
}
function toggleSet(dayKey, exIdx, setIdx) {
  const key = `${dayKey}_${exIdx}_${setIdx}`;
  state.sets[key] = !state.sets[key];
  saveState();
  render();
}
function saveActualLevel(dayKey, exIdx, value) {
  state.weights[`${dayKey}_${exIdx}_actual`] = value;
  saveState();
}
function switchDay(day) {
  currentDay = day;
  state.currentDay = day;
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function resetDay() {
  if (!confirm('重置本日所有打勾记录？')) return;
  Object.keys(state.sets).forEach(k => { if (k.startsWith(currentDay + '_')) delete state.sets[k]; });
  saveState();
  render();
}
function resetAll() {
  if (!confirm('清空全部数据（包括所有日记录和变式难度）？')) return;
  state = { sets: {}, weights: {}, currentDay: 'day1' };
  saveState();
  currentDay = 'day1';
  render();
}
function isDayComplete(dayKey) {
  if (dayKey === 'info') return false;
  const exs = PLAN[dayKey].exercises;
  for (let i = 0; i < exs.length; i++) {
    for (let s = 0; s < exs[i].sets; s++) {
      if (!state.sets[`${dayKey}_${i}_${s}`]) return false;
    }
  }
  return true;
}
function getDayProgress(dayKey) {
  const exs = PLAN[dayKey].exercises;
  let total = 0, done = 0;
  exs.forEach((ex, i) => {
    for (let s = 0; s < ex.sets; s++) {
      total++;
      if (state.sets[`${dayKey}_${i}_${s}`]) done++;
    }
  });
  return { done, total, pct: total ? (done/total*100) : 0 };
}

function render() {
  const d = new Date();
  document.getElementById('date').textContent = `${d.getMonth()+1}月${d.getDate()}日 · ${['日','一','二','三','四','五','六'][d.getDay()]}`;

  const tabsEl = document.getElementById('dayTabs');
  const days = [
    { key: 'day1', label: '推', num: 'Day 1' },
    { key: 'day2', label: '拉', num: 'Day 2' },
    { key: 'day3', label: '腿', num: 'Day 3' },
    { key: 'day4', label: '综合', num: 'Day 4' },
    { key: 'info', label: '饮食', num: 'Info' }
  ];
  tabsEl.innerHTML = days.map(d => {
    const complete = d.key !== 'info' && isDayComplete(d.key) ? 'completed' : '';
    const active = currentDay === d.key ? 'active' : '';
    return `<div class="day-tab ${active} ${complete}" onclick="switchDay('${d.key}')">
      <span class="day-num">${d.num}</span>${d.label}
    </div>`;
  }).join('');

  const main = document.getElementById('main');
  if (currentDay === 'info') {
    main.innerHTML = `
      <div class="day-header">
        <div class="day-meta">SCHEDULE / NUTRITION / TIPS</div>
        <h2 class="day-title">饮食与<em>原则</em></h2>
      </div>
      ${PRINCIPLES_HTML}
    `;
    return;
  }

  const day = PLAN[currentDay];
  const prog = getDayProgress(currentDay);
  
  let firstStretchIndex = day.exercises.findIndex(ex => ex.isStretch);
  let exercisesHTML = '';
  
  day.exercises.forEach((ex, i) => {
    if (i === firstStretchIndex && firstStretchIndex > 0) {
      exercisesHTML += `<div class="section-divider">训练后拉伸 · Cool Down</div>`;
    }
    
    let allDone = true;
    const setBtns = [];
    for (let s = 0; s < ex.sets; s++) {
      const key = `${currentDay}_${i}_${s}`;
      const done = state.sets[key];
      if (!done) allDone = false;
      setBtns.push(`<button class="set-btn ${done?'done':''}" onclick="toggleSet('${currentDay}',${i},${s})">${s+1}</button>`);
    }
    const actualKey = `${currentDay}_${i}_actual`;
    const actualVal = state.weights[actualKey] || '';
    const stretchClass = ex.isStretch ? 'stretch' : '';
    const labelText = ex.isStretch ? '拉伸方法' : '动作变式 · 难度进阶';
    const placeholderText = ex.isStretch ? '记录今天的拉伸感受（可选）' : '如：L2 标准引体 × 8 次';
    
    exercisesHTML += `
      <div class="exercise ${stretchClass} ${allDone?'done':''}">
        <div class="exercise-num">${ex.isStretch ? 'STRETCH' : 'EXERCISE'} ${String(i+1).padStart(2,'0')}</div>
        <h3 class="exercise-name">${ex.name}</h3>
        <span class="exercise-muscle">${ex.muscle}</span>
        <div class="specs">
          <div class="spec"><div class="spec-label">${ex.isStretch ? '次数 × 时长' : '组数 × 次数'}</div><div class="spec-value">${ex.sets} × ${ex.reps}</div></div>
          <div class="spec"><div class="spec-label">${ex.isStretch ? '说明' : '组间休息'}</div><div class="spec-value">${ex.rest}</div></div>
        </div>
        <div class="variation-row">
          <div class="variation-label">${labelText}</div>
          <div class="variation-list">${ex.variation}</div>
          <div class="actual-row">
            <span class="actual-label">今天做：</span>
            <input class="actual-input" type="text" placeholder="${placeholderText}" value="${actualVal}" 
              oninput="saveActualLevel('${currentDay}',${i},this.value)">
          </div>
        </div>
        <div class="sets">${setBtns.join('')}</div>
        <div class="notes">${ex.notes}</div>
      </div>
    `;
  });

  main.innerHTML = `
    <div class="day-header">
      <div class="day-meta">${currentDay.toUpperCase()} / ${day.focus}</div>
      <h2 class="day-title">${day.title.replace(day.focus, `<em>${day.focus}</em>`)}</h2>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
        <span>${prog.done}/${prog.total}</span>
      </div>
    </div>
    ${exercisesHTML}
  `;
}

render();
</script>
</body>
</html>
